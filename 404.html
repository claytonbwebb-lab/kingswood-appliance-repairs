<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Kingswood Appliances</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="shortcut icon" href="images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--light-bg);
    }
    .error-page__code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .error-page__title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--navy-dark);
      margin-bottom: 1rem;
    }
    .error-page__text {
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 2rem;
      font-size: 1rem;
      line-height: 1.6;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-page__logo {
      margin-bottom: 2.5rem;
    }
    .error-page__logo img {
      height: 60px;
      width: auto;
    }
  </style>
</head>
<body>

  <div class="error-page">
    <div class="error-page__logo">
      <a href="/">
        <img src="images/Kingswood-Appliances-Logo-01-1.png" alt="Kingswood Appliance Repairs" />
      </a>
    </div>
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Page Not Found</h1>
    <p class="error-page__text">Sorry, we couldn't find the page you were looking for. It may have been moved or deleted. Try heading back to the homepage or give Dave a call.</p>
    <div class="error-page__actions">
      <a href="/" class="btn btn--red">Back to Homepage</a>
      <a href="tel:07949248341" class="btn btn--navy">Call Dave: 07949 248341</a>
    </div>
  </div>

</body>
</html>
